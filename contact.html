<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="static/app.js">
    <script src="https://kit.fontawesome.com/dad20be998.js" crossorigin="anonymous"></script>
    <title>Contact</title>
</head>
<body>
    <section id="contact" class="contact-section ">
        <h2>Contact</h2>
        <form id="contact-form" method="post" action="/send_email">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" placeholder="Message" required></textarea>
            <button type="submit">Submit info</button>
        </form>
    </section>
    <div id="flash-messages" class="flash-messages"></div>
</body>
